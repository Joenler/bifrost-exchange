name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: ${{ matrix.slot }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - slot: contracts
            kind: placeholder
            path: src/contracts
          - slot: contracts-internal
            kind: placeholder
            path: src/contracts-internal
          - slot: exchange
            kind: dotnet
            path: src/exchange
            tests: tests/Bifrost.Exchange.Tests
          - slot: quoter
            kind: dotnet
            path: src/quoter
            tests: tests/Bifrost.Quoter.Tests
          - slot: imbalance
            kind: dotnet
            path: src/imbalance
            tests: tests/Bifrost.Imbalance.Tests
          - slot: dah-auction
            kind: dotnet
            path: src/dah-auction
            tests: tests/Bifrost.DahAuction.Tests
          - slot: orchestrator
            kind: dotnet
            path: src/orchestrator
            tests: tests/Bifrost.Orchestrator.Tests
          - slot: gateway
            kind: dotnet
            path: src/gateway
            tests: tests/Bifrost.Gateway.Tests
          - slot: mc-console
            kind: dotnet
            path: src/mc-console
            tests: tests/Bifrost.McConsole.Tests
          - slot: recorder
            kind: dotnet
            path: src/recorder
            tests: tests/Bifrost.Recorder.Tests
          - slot: bigscreen
            kind: node
            path: bigscreen
          - slot: aggregate-integration
            kind: aggregate
          - slot: contracts-roundtrip
            kind: polyglot
            path: contracts
            dotnet_project: tests/Bifrost.Contracts.Roundtrip.Tests
          - slot: contracts-translation
            kind: dotnet-xlang
            path: src/contracts-internal
            dotnet_project: tests/Bifrost.Contracts.Translation.Tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        if: matrix.kind == 'dotnet' || matrix.kind == 'aggregate'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node 22
        if: matrix.kind == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: bigscreen/package-lock.json

      - name: Placeholder slot — assert README + UPSTREAM exist
        if: matrix.kind == 'placeholder'
        run: |
          test -f ${{ matrix.path }}/README.md
          test -f ${{ matrix.path }}/UPSTREAM.md

      - name: Build and test (.NET slot)
        if: matrix.kind == 'dotnet'
        run: |
          dotnet build ${{ matrix.path }} -c Release --nologo
          dotnet test ${{ matrix.tests }} -c Release --nologo

      - name: Build and test (bigscreen)
        if: matrix.kind == 'node'
        working-directory: bigscreen
        run: |
          npm ci --no-audit --no-fund
          npx tsc -b
          npm run build
          npx vitest run

      - name: Aggregate integration — build .NET solution
        if: matrix.kind == 'aggregate'
        run: dotnet build Bifrost.sln -c Release --nologo

      - name: Aggregate integration — pre-build compose images (cold build, untimed)
        # The 30s budget in SPEC acceptance criterion 6 is a RUNTIME-readiness budget
        # (compose up → all containers healthy in ≤30s). Cold image builds on a
        # fresh CI runner can easily take 2–4 minutes and are not part of the budget.
        # Pre-build so the subsequent 'docker compose up --wait' starts against warm,
        # cached images — matching the developer-machine conditions Plan 10 measured.
        if: matrix.kind == 'aggregate'
        run: docker compose build

      - name: Aggregate integration — 30s compose up --wait gate
        if: matrix.kind == 'aggregate'
        run: |
          timeout 30 docker compose up --wait -d
          docker compose ps --format json > /tmp/ps.json
          if grep -E '"Health":"(unhealthy|starting)"' /tmp/ps.json; then
            echo "::error::One or more services not healthy after 30s"
            docker compose logs
            exit 1
          fi
          docker compose down --timeout 10

      - name: Setup .NET 10 (polyglot + dotnet-xlang)
        if: matrix.kind == 'polyglot' || matrix.kind == 'dotnet-xlang'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Python 3.12 (polyglot only)
        if: matrix.kind == 'polyglot'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv (polyglot only)
        if: matrix.kind == 'polyglot'
        uses: astral-sh/setup-uv@v4

      - name: Generate Python bindings (polyglot only)
        if: matrix.kind == 'polyglot'
        working-directory: contracts/python
        run: |
          uv sync
          bash build.sh

      - name: Sync harness uv environment (polyglot only)
        if: matrix.kind == 'polyglot'
        working-directory: contracts/roundtrip
        run: uv sync

      - name: Run polyglot round-trip tests (CONT-04)
        if: matrix.kind == 'polyglot'
        run: dotnet test ${{ matrix.dotnet_project }} -c Release --nologo

      - name: Run translation round-trip tests (CONT-07)
        if: matrix.kind == 'dotnet-xlang'
        run: dotnet test ${{ matrix.dotnet_project }} -c Release --nologo

  ci-lint:
    name: ci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Verify ripgrep
        run: rg --version
      - name: Build with BannedApiAnalyzers (src/ only)
        # TreatWarningsAsErrors is set in Directory.Build.props; RS0030 violations → build failure.
        run: dotnet build Bifrost.sln -c Release --nologo
      - name: ripgrep ConcurrentDictionary compound-op rule (src/)
        run: bash .github/scripts/lint-concurrent-dictionary.sh src
      - name: Forbid google.protobuf.Timestamp in contracts/*.proto
        # D-02 + RESEARCH §12 Pitfall B: BIFROST uses int64 timestamp_ns on the gRPC wire;
        # google.protobuf.Timestamp is forbidden (would reintroduce JavaScript-precision-loss
        # class on the spectator dashboard and break parity with Arena's internal TimestampNs long).
        run: |
          if grep -E 'google\.protobuf\.Timestamp|import.*google/protobuf/timestamp' contracts/*.proto 2>/dev/null; then
            echo "::error::google.protobuf.Timestamp is forbidden (D-02). Use int64 timestamp_ns."
            exit 1
          fi
          echo "OK: No google.protobuf.Timestamp in contracts/*.proto"
      - name: GSD-marker absence in src/contracts-internal/
        # RESEARCH §7.5: Arena fork (src/contracts-internal/) must not introduce GSD planning
        # traces. The main lint fence scans src/ broadly via BannedApiAnalyzers, but GSD-marker
        # detection is grep-based and scoped here to the donated tree.
        run: |
          if grep -rEn '(Phase [0-9]+|REQ-[A-Z]+-[0-9]+|PLAN\.md|\.planning/)' src/contracts-internal/ --include='*.cs' --exclude-dir='obj' --exclude-dir='bin' 2>/dev/null; then
            echo "::error::GSD markers found in src/contracts-internal/ — Arena fork must not introduce planning traces."
            exit 1
          fi
          echo "OK: No GSD markers in src/contracts-internal/**/*.cs"
      - name: Setup buf CLI
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: buf lint (contracts/)
        working-directory: contracts
        run: buf lint
      - name: buf breaking (contracts/ vs last v*.*.* tag)
        # D-08 + RESEARCH §4.4: resolve the baseline tag at runtime; trivially pass when no
        # prior v*.*.* tag exists (pre-v1 baseline). Every subsequent PR that would break wire
        # without a major version bump is blocked.
        run: |
          cd contracts
          LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v*.*.*' 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ]; then
            echo "Running buf breaking against $LATEST_TAG"
            buf breaking --against ".git#tag=$LATEST_TAG"
          else
            echo "::notice::No prior v*.*.* tag yet; buf breaking skipped (pre-v1 baseline)."
          fi

  ci-lint-fence-negative:
    name: ci-lint-fence-negative
    # Proves the fence fails on intentional violations.
    # Documented deviation from CONTEXT.md D-12: this job SHOULD also be a required check on main
    # per RESEARCH.md Open Question #2 — otherwise a PR could disable the fixtures without blocking merge.
    # Plan 14 decides whether to mark both `ci-lint` AND `ci-lint-fence-negative` as required.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Verify ripgrep
        run: rg --version
      - name: Build fixtures (EXPECTED TO FAIL with RS0030)
        run: |
          set +e
          dotnet build tests/LintFenceFixtures -c Release --nologo 2>&1 | tee build.log
          code=${PIPESTATUS[0]}
          set -e
          if [ "$code" -eq 0 ]; then
            echo "::error::tests/LintFenceFixtures built successfully — BannedApiAnalyzer fence is BROKEN"
            exit 1
          fi
          grep -q 'RS0030' build.log || { echo "::error::expected RS0030 diagnostic not found"; exit 1; }
          grep -qE 'Random\.Shared' build.log || { echo "::error::RS0030 diagnostic did not name Random.Shared"; exit 1; }
          grep -qE 'DateTime\.UtcNow' build.log || { echo "::error::RS0030 diagnostic did not name DateTime.UtcNow"; exit 1; }
          echo "✓ BannedApi fence correctly blocks Random.Shared + DateTime.UtcNow"
      - name: ripgrep fixture (EXPECTED TO FIND VIOLATIONS)
        run: |
          set +e
          bash .github/scripts/lint-concurrent-dictionary.sh tests/LintFenceFixtures 2>&1 | tee rg.log
          # PIPESTATUS[0] — not $? — so we capture the script's exit code,
          # not tee's (which is always 0 unless the pipe itself breaks).
          code=${PIPESTATUS[0]}
          set -e
          if [ "$code" -eq 0 ]; then
            echo "::error::lint-concurrent-dictionary.sh exited 0 on fixtures — the rule is BROKEN"
            exit 1
          fi
          err_count=$(grep -cE '::error file=' rg.log || true)
          if [ "$err_count" -lt 3 ]; then
            echo "::error::expected ≥ 3 ::error file= lines from script; got $err_count"
            exit 1
          fi
          echo "✓ ripgrep fence correctly flags compound ConcurrentDictionary patterns"

  ci-scrub-gsd:
    name: ci-scrub-gsd
    # Defense-in-depth GSD-marker scrub: re-runs tools/scrub-gsd.sh on every push/PR
    # so a bypass via `git commit --no-verify` (which would defeat the pre-commit hook
    # from tools/install-hooks.sh) still gets caught in CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Verify ripgrep
        run: rg --version
      - name: Run scrub-gsd.sh
        run: bash tools/scrub-gsd.sh

  ci-scrub-gsd-negative:
    name: ci-scrub-gsd-negative
    # Continuous proof that the scrubber still blocks a planted marker.
    # Symmetric to ci-lint-fence-negative: protects against a PR that accidentally
    # (or maliciously) weakens the scanner while leaving it passing on clean trees.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Verify ripgrep
        run: rg --version
      - name: Run scrub-gsd-negative.sh
        run: bash tests/scripts/scrub-gsd-negative.sh
