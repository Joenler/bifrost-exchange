name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.slot }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - slot: contracts
            kind: placeholder
            path: src/contracts
          - slot: contracts-internal
            kind: placeholder
            path: src/contracts-internal
          - slot: exchange
            kind: dotnet
            path: src/exchange
            tests: tests/Bifrost.Exchange.Tests
          - slot: quoter
            kind: dotnet
            path: src/quoter
            tests: tests/Bifrost.Quoter.Tests
          - slot: imbalance
            kind: dotnet
            path: src/imbalance
            tests: tests/Bifrost.Imbalance.Tests
          - slot: dah-auction
            kind: dotnet
            path: src/dah-auction
            tests: tests/Bifrost.DahAuction.Tests
          - slot: orchestrator
            kind: dotnet
            path: src/orchestrator
            tests: tests/Bifrost.Orchestrator.Tests
          - slot: gateway
            kind: dotnet
            path: src/gateway
            tests: tests/Bifrost.Gateway.Tests
          - slot: mc-console
            kind: dotnet
            path: src/mc-console
            tests: tests/Bifrost.McConsole.Tests
          - slot: recorder
            kind: dotnet
            path: src/recorder
            tests: tests/Bifrost.Recorder.Tests
          - slot: bigscreen
            kind: node
            path: bigscreen
          - slot: aggregate-integration
            kind: aggregate
          - slot: contracts-roundtrip
            kind: polyglot
            path: contracts
            dotnet_project: tests/Bifrost.Contracts.Roundtrip.Tests
          - slot: contracts-translation
            kind: dotnet-xlang
            path: src/contracts-internal
            dotnet_project: tests/Bifrost.Contracts.Translation.Tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        if: matrix.kind == 'dotnet' || matrix.kind == 'aggregate'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node 22
        if: matrix.kind == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: bigscreen/package-lock.json

      - name: Placeholder slot — assert README + UPSTREAM exist
        if: matrix.kind == 'placeholder'
        run: |
          test -f ${{ matrix.path }}/README.md
          test -f ${{ matrix.path }}/UPSTREAM.md

      - name: Build and test (.NET slot)
        if: matrix.kind == 'dotnet'
        run: |
          dotnet build ${{ matrix.path }} -c Release --nologo
          dotnet test ${{ matrix.tests }} -c Release --nologo

      - name: Build and test (bigscreen)
        if: matrix.kind == 'node'
        working-directory: bigscreen
        run: |
          npm ci --no-audit --no-fund
          npx tsc -b
          npm run build
          npx vitest run

      - name: Aggregate integration — build .NET solution
        if: matrix.kind == 'aggregate'
        run: dotnet build Bifrost.sln -c Release --nologo

      - name: Aggregate integration — pre-build compose images (cold build, untimed)
        # The 30s budget in SPEC acceptance criterion 6 is a RUNTIME-readiness budget
        # (compose up → all containers healthy in ≤30s). Cold image builds on a
        # fresh CI runner can easily take 2–4 minutes and are not part of the budget.
        # Pre-build so the subsequent 'docker compose up --wait' starts against warm,
        # cached images — matching the developer-machine conditions Plan 10 measured.
        if: matrix.kind == 'aggregate'
        run: docker compose build

      - name: Aggregate integration — pull third-party images (untimed)
        # `docker compose build` only builds locally-defined images; third-party
        # images like `rabbitmq:4-management` (~46 MB) are pulled on first up.
        # Pulling them here (outside the 30s gate) keeps the runtime-readiness
        # budget honest — the previous pass ran the pull INSIDE `timeout 30`,
        # which on a cold GitHub runner consumed ~10s of the 30s window before
        # any container could start, causing the gate to SIGTERM compose while
        # quoter was still in its healthcheck start_period. The resulting
        # `container bifrost-exchange-quoter-1 exited (0)` was the SIGTERM
        # response, not an actual crash.
        if: matrix.kind == 'aggregate'
        run: docker compose pull --quiet

      - name: Aggregate integration — 30s compose up --wait gate
        if: matrix.kind == 'aggregate'
        run: |
          if ! timeout 30 docker compose up --wait -d; then
            echo "::error::compose up --wait did not complete within 30s runtime-readiness budget"
            docker compose ps
            docker compose logs --tail=80
            docker compose down --timeout 10 || true
            exit 1
          fi
          docker compose ps --format json > /tmp/ps.json
          if grep -E '"Health":"(unhealthy|starting)"' /tmp/ps.json; then
            echo "::error::One or more services not healthy after 30s"
            docker compose logs --tail=80
            docker compose down --timeout 10 || true
            exit 1
          fi
          docker compose down --timeout 10

      - name: Setup .NET 10 (polyglot + dotnet-xlang)
        if: matrix.kind == 'polyglot' || matrix.kind == 'dotnet-xlang'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Python 3.12 (polyglot only)
        if: matrix.kind == 'polyglot'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup uv (polyglot only)
        if: matrix.kind == 'polyglot'
        uses: astral-sh/setup-uv@v4

      - name: Generate Python bindings (polyglot only)
        if: matrix.kind == 'polyglot'
        working-directory: contracts/python
        run: |
          uv sync
          bash build.sh

      - name: Sync harness uv environment (polyglot only)
        if: matrix.kind == 'polyglot'
        working-directory: contracts/roundtrip
        run: uv sync

      - name: Run polyglot round-trip tests (CONT-04)
        if: matrix.kind == 'polyglot'
        run: dotnet test ${{ matrix.dotnet_project }} -c Release --nologo

      - name: Run translation round-trip tests (CONT-07)
        if: matrix.kind == 'dotnet-xlang'
        run: dotnet test ${{ matrix.dotnet_project }} -c Release --nologo

  ci-lint:
    name: ci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Verify ripgrep
        run: rg --version
      - name: Build with BannedApiAnalyzers (src/ only)
        # TreatWarningsAsErrors is set in Directory.Build.props; RS0030 violations → build failure.
        run: dotnet build Bifrost.sln -c Release --nologo
      - name: ripgrep ConcurrentDictionary compound-op rule (src/)
        run: bash .github/scripts/lint-concurrent-dictionary.sh src
      - name: Forbid google.protobuf.Timestamp in contracts/*.proto
        # D-02 + RESEARCH §12 Pitfall B: BIFROST uses int64 timestamp_ns on the gRPC wire;
        # google.protobuf.Timestamp is forbidden (would reintroduce JavaScript-precision-loss
        # class on the spectator dashboard and break parity with Arena's internal TimestampNs long).
        run: |
          if grep -E 'google\.protobuf\.Timestamp|import.*google/protobuf/timestamp' contracts/*.proto 2>/dev/null; then
            echo "::error::google.protobuf.Timestamp is forbidden (D-02). Use int64 timestamp_ns."
            exit 1
          fi
          echo "OK: No google.protobuf.Timestamp in contracts/*.proto"
      - name: GSD-marker absence in src/contracts-internal/
        # RESEARCH §7.5: Arena fork (src/contracts-internal/) must not introduce GSD planning
        # traces. The main lint fence scans src/ broadly via BannedApiAnalyzers, but GSD-marker
        # detection is grep-based and scoped here to the donated tree.
        run: |
          if grep -rEn '(Phase [0-9]+|REQ-[A-Z]+-[0-9]+|PLAN\.md|\.planning/)' src/contracts-internal/ --include='*.cs' --exclude-dir='obj' --exclude-dir='bin' 2>/dev/null; then
            echo "::error::GSD markers found in src/contracts-internal/ — Arena fork must not introduce planning traces."
            exit 1
          fi
          echo "OK: No GSD markers in src/contracts-internal/**/*.cs"
      - name: Setup buf CLI
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: buf lint (contracts/)
        working-directory: contracts
        run: buf lint
      - name: buf breaking (contracts/ vs last v*.*.* tag)
        # D-08 + RESEARCH §4.4: resolve the baseline tag at runtime; trivially pass when no
        # prior v*.*.* tag exists (pre-v1 baseline). Every subsequent PR that would break wire
        # without a major version bump is blocked.
        run: |
          cd contracts
          LATEST_TAG=$(git describe --tags --abbrev=0 --match 'v*.*.*' 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ]; then
            echo "Running buf breaking against $LATEST_TAG"
            buf breaking --against ".git#tag=$LATEST_TAG"
          else
            echo "::notice::No prior v*.*.* tag yet; buf breaking skipped (pre-v1 baseline)."
          fi

  ci-lint-fence-negative:
    name: ci-lint-fence-negative
    # Proves the fence fails on intentional violations.
    # Documented deviation from CONTEXT.md D-12: this job SHOULD also be a required check on main
    # per RESEARCH.md Open Question #2 — otherwise a PR could disable the fixtures without blocking merge.
    # Plan 14 decides whether to mark both `ci-lint` AND `ci-lint-fence-negative` as required.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Verify ripgrep
        run: rg --version
      - name: Build fixtures (EXPECTED TO FAIL with RS0030)
        run: |
          set +e
          dotnet build tests/LintFenceFixtures -c Release --nologo 2>&1 | tee build.log
          code=${PIPESTATUS[0]}
          set -e
          if [ "$code" -eq 0 ]; then
            echo "::error::tests/LintFenceFixtures built successfully — BannedApiAnalyzer fence is BROKEN"
            exit 1
          fi
          grep -q 'RS0030' build.log || { echo "::error::expected RS0030 diagnostic not found"; exit 1; }
          grep -qE 'Random\.Shared' build.log || { echo "::error::RS0030 diagnostic did not name Random.Shared"; exit 1; }
          grep -qE 'DateTime\.UtcNow' build.log || { echo "::error::RS0030 diagnostic did not name DateTime.UtcNow"; exit 1; }
          echo "✓ BannedApi fence correctly blocks Random.Shared + DateTime.UtcNow"
      - name: ripgrep fixture (EXPECTED TO FIND VIOLATIONS)
        run: |
          set +e
          bash .github/scripts/lint-concurrent-dictionary.sh tests/LintFenceFixtures 2>&1 | tee rg.log
          # PIPESTATUS[0] — not $? — so we capture the script's exit code,
          # not tee's (which is always 0 unless the pipe itself breaks).
          code=${PIPESTATUS[0]}
          set -e
          if [ "$code" -eq 0 ]; then
            echo "::error::lint-concurrent-dictionary.sh exited 0 on fixtures — the rule is BROKEN"
            exit 1
          fi
          err_count=$(grep -cE '::error file=' rg.log || true)
          if [ "$err_count" -lt 3 ]; then
            echo "::error::expected ≥ 3 ::error file= lines from script; got $err_count"
            exit 1
          fi
          echo "✓ ripgrep fence correctly flags compound ConcurrentDictionary patterns"

  ci-scrub-gsd:
    name: ci-scrub-gsd
    # Defense-in-depth GSD-marker scrub: re-runs tools/scrub-gsd.sh on every push/PR
    # so a bypass via `git commit --no-verify` (which would defeat the pre-commit hook
    # from tools/install-hooks.sh) still gets caught in CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Verify ripgrep
        run: rg --version
      - name: Run scrub-gsd.sh
        run: bash tools/scrub-gsd.sh

  ci-scrub-gsd-negative:
    name: ci-scrub-gsd-negative
    # Continuous proof that the scrubber still blocks a planted marker.
    # Symmetric to ci-lint-fence-negative: protects against a PR that accidentally
    # (or maliciously) weakens the scanner while leaving it passing on clean trees.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Verify ripgrep
        run: rg --version
      - name: Run scrub-gsd-negative.sh
        run: bash tests/scripts/scrub-gsd-negative.sh

  docker-smoke-build:
    # Prove every service image builds for linux/arm64 via QEMU on ubuntu-latest.
    # Native ubuntu-24.04-arm runners rejected (billing coupling).
    # Self-hosted runners rejected (ops cost disproportionate to smoke-gate value).
    name: docker-smoke-build (${{ matrix.service }} / linux/arm64)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - exchange
          - quoter
          - imbalance
          - recorder
          - orchestrator
          - gateway
          - dah-auction
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }} image for linux/arm64 (smoke, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/${{ matrix.service }}/Dockerfile
          platforms: linux/arm64
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.service }}-arm64
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}-arm64

  orchestrator-tests:
    name: orchestrator-tests
    # Quick orchestrator suite: excludes the Long-trait FakeClock 30-min hold
    # theory rows (NoAutoAdvanceTests) so PR feedback stays fast. The Long
    # suite still runs on demand via `workflow_dispatch` below; the existing
    # `build` matrix slot named `orchestrator` runs the FULL suite (including
    # the 6 Long-trait rows — ~3s extra under FakeClock virtual time) as a
    # defense-in-depth.
    #
    # Filter syntax note: the conceptual filter is `Trait!=Long` (exclude the
    # Long-trait theory rows from the default run). The xunit.v3 vstest filter
    # dialect for `[Trait("Long","true")]` is `Long=true` (the trait NAME
    # equals the trait VALUE; the `Trait=` prefix is implicit). `Long!=true`
    # excludes the long suite from the default run. Filter syntax verified in
    # Plan 06-13's deviation #3.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build orchestrator + tests
        run: |
          dotnet build src/orchestrator/Bifrost.Orchestrator.csproj -c Release --nologo
          dotnet build tests/Bifrost.Orchestrator.Tests/Bifrost.Orchestrator.Tests.csproj -c Release --nologo
      - name: orchestrator-tests
        run: |
          dotnet test tests/Bifrost.Orchestrator.Tests/Bifrost.Orchestrator.Tests.csproj \
            -c Release --nologo --no-build \
            --filter "Long!=true"

  ci-no-auto-advance:
    name: ci-no-auto-advance
    # Falsifiable regression guard for SPEC Req 13 ("no auto-advance"). Greps
    # src/orchestrator/**/*.cs + appsettings.json + tests/ for timer patterns
    # outside a 3-file basename whitelist (IterationSeedTimer.cs +
    # HeartbeatToleranceMonitor.cs + StartupLogger.cs), the AutoAdvance symbol,
    # and the "auto-advance" string literal. Mirrors the ci-scrub-gsd job
    # template above. Tamper-tested in Plan 06-13 (a temporary Task.Delay(60_000)
    # in OrchestratorActor.cs trips guard (b)).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Verify ripgrep
        run: rg --version
      - name: Run no-auto-advance-guard.sh
        run: bash tools/no-auto-advance-guard.sh

  orchestrator-compose-smoke:
    name: orchestrator-compose-smoke
    # End-to-end live-process smoke: build the orchestrator image, bring it up
    # alongside its RabbitMQ dependency under docker compose, assert the
    # container reaches the `healthy` state, then ping
    # `bifrost.mc.v1.OrchestratorService/Execute` with an AuctionOpen command
    # via grpcurl. Proves the gRPC server actually serves traffic on port 5006
    # against a real (not in-process) Kestrel + Polly RabbitMQ-pipeline boot.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build orchestrator image
        run: docker compose build orchestrator
      - name: Pull third-party images (rabbitmq) outside the boot budget
        run: docker compose pull --quiet rabbitmq
      - name: Compose up orchestrator + rabbitmq (60s timeout, --wait gates on healthy)
        run: |
          if ! timeout 60 docker compose up --wait --wait-timeout 30 -d orchestrator rabbitmq; then
            echo "::error::orchestrator did not reach healthy within 60s"
            docker compose ps
            docker compose logs --tail=120 orchestrator rabbitmq
            docker compose down --timeout 10 || true
            exit 1
          fi
      - name: Assert orchestrator container is healthy
        run: |
          docker compose ps --format json | tee /tmp/compose-ps.json
          if ! grep -E '"Service":"orchestrator".*"Health":"healthy"' /tmp/compose-ps.json; then
            echo "::error::orchestrator container is not healthy"
            docker compose logs --tail=120 orchestrator
            docker compose down --timeout 10 || true
            exit 1
          fi
      - name: Install grpcurl
        run: |
          curl -sSL https://github.com/fullstorydev/grpcurl/releases/download/v1.9.1/grpcurl_1.9.1_linux_x86_64.tar.gz \
            | sudo tar -xz -C /usr/local/bin grpcurl
          grpcurl --version
      - name: Ping bifrost.mc.v1.OrchestratorService/Execute (AuctionOpen)
        run: |
          # Drive the orchestrator from its boot state (IterationOpen) into
          # AuctionOpen via a confirmed AuctionOpenCmd. The expected response
          # is McCommandResult { success: true, new_state: STATE_AUCTION_OPEN }.
          # A failure response (success: false) or transport-level error fails
          # the smoke. The proto import path is the contracts/ root; mc.proto
          # imports round.proto + events.proto from the same root.
          set -euo pipefail
          response=$(grpcurl -plaintext \
            -import-path contracts \
            -proto contracts/mc.proto \
            -d '{"operator_host":"ci","confirm":true,"auction_open":{"round_number":1}}' \
            localhost:5006 \
            bifrost.mc.v1.OrchestratorService/Execute)
          echo "$response"
          if ! echo "$response" | grep -q '"success": *true'; then
            echo "::error::Execute(AuctionOpen) did not return success=true"
            docker compose logs --tail=120 orchestrator
            exit 1
          fi
      - name: Compose down
        if: always()
        run: docker compose down --timeout 10 || true

  orchestrator-long-suite:
    name: orchestrator-long-suite
    # Manual/dispatch-only run of the Long-trait NoAutoAdvanceTests theory
    # (6 rows × 30-min FakeClock hold per state). VALIDATION.md ceiling is
    # 35 minutes real wall-clock for the original (real-time) formulation;
    # the FakeClock-driven implementation runs in ~5 seconds. Kept as an
    # explicit dispatch slot so the SPEC's long-suite-availability requirement
    # is satisfied without adding it to every PR run.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Run orchestrator long suite (filter Long=true)
        run: |
          dotnet test tests/Bifrost.Orchestrator.Tests/Bifrost.Orchestrator.Tests.csproj \
            -c Release --nologo \
            --filter "Long=true"
