syntax = "proto3";

package bifrost.market.v1;

option csharp_namespace = "Bifrost.Contracts.Market";

import "events.proto";

enum Side {
  SIDE_UNSPECIFIED = 0;
  SIDE_BUY = 1;
  SIDE_SELL = 2;
}

enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_LIMIT = 1;
  ORDER_TYPE_MARKET = 2;
  ORDER_TYPE_ICEBERG = 3;
  ORDER_TYPE_FOK = 4;
  ORDER_TYPE_IOC = 5;
}

enum ProductType {
  PRODUCT_TYPE_UNSPECIFIED = 0;
  PRODUCT_TYPE_HOUR = 1;
  PRODUCT_TYPE_QUARTER = 2;
}

// Instrument identity. Fields align with the internal InstrumentIdDto shape
// (delivery_area + delivery_period_start/end) and add a ProductType tag for
// routing.
message Instrument {
  string instrument_id = 1;              // canonical string id used in routing keys
  string delivery_area = 2;              // single-area at v1 (e.g. "DE")
  int64 delivery_period_start_ns = 3;    // nanoseconds since Unix epoch
  int64 delivery_period_end_ns = 4;
  ProductType product_type = 5;
}

// One price level in the order book.
message BookLevel {
  int64 price_ticks = 1;      // scaled integer; tick size set by exchange config
  int64 quantity_ticks = 2;   // scaled integer; tick size set by exchange config
  int32 order_count = 3;
}

// DEFERRED: depth bound (10-level vs full) is decided later. repeated
// BookLevel can grow without breaking consumers.
message BookView {
  repeated BookLevel bids = 1;   // highest price first
  repeated BookLevel asks = 2;   // lowest price first
  int64 sequence = 3;
  int64 timestamp_ns = 4;
}

// ImbalancePrint — public per-quarter realized imbalance price, broadcast at
// Gate. Emitted once per quarter (Q1..Q4) so teams can decompose the
// aggregate settlement into team-contributed vs physical-shock components.
message ImbalancePrint {
  int32 round_number = 1;
  bifrost.market.v1.Instrument instrument = 2;
  int32 quarter_index = 3;
  int64 p_imb_ticks = 4;
  int64 a_total_ticks = 5;        // A_teams + A_physical, signed
  int64 a_physical_ticks = 6;     // separately visible for decomposition
  bifrost.events.v1.Regime regime = 7;
  int64 timestamp_ns = 8;
}
