# BIFROST gRPC wire contracts — buf lint + breaking-change configuration.
#
# - version v2 (current stable at authoring).
# - STANDARD lint tier covers PACKAGE_DEFINED, MESSAGE_PASCAL_CASE,
#   FIELD_LOWER_SNAKE_CASE, ENUM_VALUE_PREFIX, FILE_LOWER_SNAKE_CASE,
#   and the `<PREFIX>_UNSPECIFIED = 0` convention (D-07).
#   (STANDARD is the successor name for DEFAULT; identical rules, no deprecation warning.)
# - The `except:` list below drops four stylistic rules that would force
#   structural refactors unrelated to wire safety:
#     * PACKAGE_DIRECTORY_MATCH / PACKAGE_SAME_DIRECTORY — contracts/ uses
#       a flat layout matching Arena's `protos/` convention; buf wants
#       `contracts/bifrost/<surface>/v1/<surface>.proto` nesting. Wire
#       correctness does not depend on directory shape.
#     * RPC_REQUEST_STANDARD_NAME / RPC_RESPONSE_STANDARD_NAME — BIFROST
#       uses semantic oneof-container names (`StrategyCommand`, `MarketEvent`)
#       rather than the `{RpcName}Request/{RpcName}Response` pattern.
#       Renaming would cascade through 51 roundtrip tests, 8 translation
#       fixtures, the Python harness TYPE_MAP, and docs/gateway-mapping.md.
# - FILE breaking-change scope: catches field-type changes, deleted fields
#   without `reserved`, enum value changes, field number changes, and oneof
#   membership changes (D-08). Reference tag resolved at CI run-time via
#   `git describe --tags --abbrev=0 --match 'v*.*.*'` in the CI step.
# - No `buf.gen.yaml`: codegen is handled by `Grpc.Tools` (.NET, MSBuild)
#   and `grpcio-tools` (Python, CI). See contracts/README.md.

version: v2
modules:
  - path: .
lint:
  use:
    - STANDARD
  except:
    - PACKAGE_DIRECTORY_MATCH
    - PACKAGE_SAME_DIRECTORY
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE
