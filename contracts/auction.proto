syntax = "proto3";

package bifrost.auction.v1;

option csharp_namespace = "Bifrost.Contracts.Auction";

import "market.proto";

message BidStep {
  int64 price_ticks = 1;
  int64 quantity_ticks = 2;
}

message BidMatrix {
  string team_name = 1;
  string quarter_id = 2;                        // instrument_id from market.v1
  repeated BidStep buy_steps = 3;               // monotonicity checked downstream
  repeated BidStep sell_steps = 4;
}

message ClearingResult {
  string quarter_id = 1;
  int64 clearing_price_ticks = 2;
  int64 awarded_quantity_ticks = 3;             // per-team; emitted on team's private stream too
  string team_name = 4;                          // empty on shared-topic emission
}
